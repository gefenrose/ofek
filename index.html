<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5B6B8C">
<meta name="description" content="Ofek — a quiet companion for your days.">
<title>אופק · Ofek</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F4;
    --paper-raised:#FFFFFF;
    --ink:#2B2E33;
    --ink-soft:#6B6F76;
    --ink-faint:#A6A9AE;
    --line:#E7E2D8;
    --h-low:#2E3148;
    --h-mid1:#5B6B8C;
    --h-mid2:#8FB8C9;
    --h-high:#F4C77B;
    --accent:#5B7A8C;
    --accent-ink:#FFFFFF;
    --danger:#B5564A;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --shadow:0 2px 18px rgba(43,46,51,0.07);
    --safe-t:env(safe-area-inset-top, 0px);
    --safe-b:env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--paper); color:var(--ink);}
  body{
    font-family:'Assistant', system-ui, sans-serif;
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
    animation:bodyFadeIn .4s ease;
  }
  @keyframes bodyFadeIn{from{opacity:0;} to{opacity:1;}}
  .display{font-family:'Frank Ruhl Libre', serif;}
  button, input, textarea{font-family:inherit; font-size:16px;}
  button{border:none; background:none; cursor:pointer; color:inherit;}
  input, textarea{border:none; outline:none; background:none; color:inherit;}
  ::selection{background:var(--h-mid2); color:var(--ink);}

  #app, #onboarding{
    max-width:480px;
    margin:0 auto;
    min-height:100dvh;
    min-height:100vh;
    position:relative;
    background:var(--paper);
  }

  /* ---------- Onboarding ---------- */
  #onboarding{
    display:flex; flex-direction:column; justify-content:center;
    padding:calc(32px + var(--safe-t)) 28px calc(32px + var(--safe-b));
    min-height:100dvh;
  }
  .ob-mark{width:64px; height:64px; border-radius:18px; overflow:hidden; margin-bottom:22px; box-shadow:var(--shadow);}
  .ob-mark img{width:100%; height:100%; display:block;}
  .ob-title{font-size:1.7rem; font-weight:700; margin:0 0 6px;}
  .ob-sub{color:var(--ink-soft); margin:0 0 28px; font-size:0.97rem;}
  .field{margin-bottom:22px;}
  .field label{display:block; font-size:0.85rem; color:var(--ink-soft); margin-bottom:8px;}
  .field input[type=text]{
    width:100%; padding:13px 16px; border-radius:var(--radius-md);
    background:var(--paper-raised); border:1px solid var(--line); font-size:1rem;
  }
  .pillrow{display:flex; gap:8px; flex-wrap:wrap;}
  .pill{
    padding:10px 16px; border-radius:999px; border:1px solid var(--line);
    background:var(--paper-raised); font-size:0.9rem; color:var(--ink-soft);
    transition:background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease;
  }
  .pill:hover{border-color:var(--accent);}
  .pill:active{transform:scale(.96);}
  .pill.active{background:var(--accent); color:var(--accent-ink); border-color:var(--accent);}
  .btn-primary{
    width:100%; padding:15px; border-radius:var(--radius-md); background:var(--ink);
    color:var(--paper); font-weight:600; font-size:1rem; margin-top:8px;
    transition:opacity .15s ease, transform .12s ease;
  }
  .btn-primary:active:not(:disabled){transform:scale(.98);}
  .btn-primary:disabled{opacity:.4;}

  /* ---------- App shell ---------- */
  #app{display:none; flex-direction:column;}
  #app.live{display:flex; animation:appIn .35s ease;}
  @keyframes appIn{from{opacity:0;} to{opacity:1;}}

  .sidenav{display:none;}
  .app-shell{display:flex; flex-direction:column; min-width:0; flex:1;}

  header.topbar{
    position:sticky; top:0; z-index:20; background:var(--paper);
    padding:calc(14px + var(--safe-t)) 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand img{width:28px; height:28px; border-radius:8px;}
  .brand span{font-size:1.15rem; font-weight:700;}
  .topbar-actions{display:flex; align-items:center; gap:6px;}
  .icon-btn{
    width:38px; height:38px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; color:var(--ink-soft); transition:background .15s ease, transform .12s ease;
  }
  .icon-btn:hover{background:var(--line);}
  .icon-btn:active{background:var(--line); transform:scale(.92);}
  .lang-toggle{display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden;}
  .lang-toggle button{padding:6px 11px; font-size:0.78rem; color:var(--ink-soft); transition:background .15s ease, color .15s ease;}
  .lang-toggle button.active{background:var(--ink); color:var(--paper);}

  .ribbon{height:7px; margin:0 18px 4px; border-radius:999px; background:linear-gradient(90deg, var(--h-low), var(--h-mid1), var(--h-mid2), var(--h-high)); transition:background 1s ease, filter .6s;}
  @media (prefers-reduced-motion: no-preference){
    .ribbon.ambient{ animation:ribbonDrift 18s ease-in-out infinite; }
  }
  @keyframes ribbonDrift{
    0%,100%{filter:hue-rotate(0deg) saturate(1);}
    50%{filter:hue-rotate(6deg) saturate(1.08);}
  }

  .footer-ribbon{height:7px; margin:30px 18px 10px; border-radius:999px; background:linear-gradient(90deg, var(--h-low), var(--h-mid1), var(--h-mid2), var(--h-high)); opacity:.55;}
  .footer-credit{text-align:center; padding:0 18px 22px;}
  .footer-credit span{font-size:0.7rem; color:var(--ink-faint);}

  main{flex:1; overflow-y:auto; padding-bottom:calc(86px + var(--safe-b));}
  .panel{display:none; padding:6px 18px 28px;}
  .panel.active{display:block; animation:panelIn .28s ease;}
  @keyframes panelIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  nav.bottomnav{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    background:var(--paper-raised); border-top:1px solid var(--line);
    display:flex; padding:8px 10px calc(8px + var(--safe-b));
    z-index:30;
  }
  nav.bottomnav button{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:6px 0; color:var(--ink-faint); font-size:0.72rem; transition:color .2s ease;
  }
  nav.bottomnav button svg{width:22px; height:22px;}
  nav.bottomnav button.active{color:var(--accent);}

  /* ---------- Chat ---------- */
  .greeting{padding:14px 2px 6px;}
  .greeting h1{font-size:1.3rem; margin:0 0 2px;}
  .greeting p{margin:0; color:var(--ink-soft); font-size:0.9rem;}
  .flowrow{display:flex; gap:8px; overflow-x:auto; padding:12px 2px 6px; scrollbar-width:none;}
  .flowrow::-webkit-scrollbar{display:none;}
  .flowchip{
    flex:0 0 auto; padding:9px 14px; border-radius:999px; background:var(--paper-raised);
    border:1px solid var(--line); font-size:0.85rem; white-space:nowrap; color:var(--ink);
    transition:background .15s ease, border-color .15s ease, transform .12s ease;
  }
  .flowchip:hover{border-color:var(--accent);}
  .flowchip:active{transform:scale(.96);}
  .flowchip.highlight{border-color:var(--accent); background:#5B7A8C14;}
  .flowchip-mood{display:inline-flex; align-items:center;}
  .mood-dot{
    display:inline-block; width:12px; height:12px; border-radius:50%; flex:0 0 auto;
    background:linear-gradient(135deg, var(--h-low), var(--h-mid2), var(--h-high));
    margin-inline-end:6px;
  }

  .distress-card{
    margin:10px 2px 4px; padding:12px 14px; border-radius:var(--radius-md);
    background:#B5564A0F; border:1px solid #B5564A26; display:flex; align-items:center; gap:10px;
    overflow:hidden; transition:max-height .3s ease, opacity .3s ease, margin .3s ease, padding .3s ease, border-color .3s ease;
  }
  .distress-card > svg{flex:0 0 auto; color:var(--danger); width:18px; height:18px;}
  .distress-card .dtext{flex:1; font-size:0.8rem; color:var(--ink-soft); line-height:1.4;}
  .distress-card a{color:var(--danger); font-weight:700; text-decoration:none;}
  .distress-card .dismiss-btn{
    flex:0 0 auto; width:24px; height:24px; border-radius:50%; color:var(--ink-faint);
    display:flex; align-items:center; justify-content:center; transition:background .15s ease;
  }
  .distress-card .dismiss-btn svg{width:14px; height:14px;}
  .distress-card .dismiss-btn:hover{background:#00000012; color:var(--ink-soft);}

  .thread{display:flex; flex-direction:column; gap:10px; padding:10px 2px 14px; min-height:80px;}
  .bubble{max-width:84%; padding:11px 15px; border-radius:18px; font-size:0.95rem; line-height:1.45; animation:bubbleIn .25s ease;}
  @media (prefers-reduced-motion: reduce){ .bubble{animation:none;} }
  @keyframes bubbleIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  #typing-bubble{animation:bubbleIn .25s ease, typingPulse 1.2s ease-in-out infinite;}
  @keyframes typingPulse{0%,100%{opacity:.45;} 50%{opacity:1;}}
  .bubble.ai{align-self:flex-start; background:var(--paper-raised); border:1px solid var(--line); border-start-start-radius:6px;}
  .bubble.user{align-self:flex-end; background:var(--ink); color:var(--paper); border-end-end-radius:6px;}
  .bubble.system{align-self:center; background:none; color:var(--ink-faint); font-size:0.78rem; max-width:100%; text-align:center;}

  .composer{
    position:sticky; bottom:0; display:flex; align-items:flex-end; gap:8px;
    padding:10px 2px 2px; background:linear-gradient(to top, var(--paper) 60%, transparent);
  }
  .composer textarea{
    flex:1; resize:none; max-height:120px; padding:12px 16px; border-radius:var(--radius-md);
    background:var(--paper-raised); border:1px solid var(--line);
  }
  .send-btn{
    width:44px; height:44px; border-radius:50%; background:var(--ink); color:var(--paper);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto;
    transition:opacity .15s ease, transform .12s ease;
  }
  .send-btn:active:not(:disabled){transform:scale(.9);}
  .send-btn:disabled{opacity:.35;}
  .endflow-row{display:flex; justify-content:center; padding:6px 0 2px;}
  .endflow-row button{font-size:0.82rem; color:var(--ink-soft); text-decoration:underline; text-decoration-color:var(--line);}

  /* ---------- Mood slider ---------- */
  .moodpicker{padding:18px 4px 8px; text-align:center;}
  .moodpicker .moodlabel{font-size:1.4rem; font-weight:700; margin-bottom:4px; transition:color .2s;}
  .moodpicker .moodsub{color:var(--ink-faint); font-size:0.8rem; margin-bottom:18px;}
  input[type=range].moodslider{
    -webkit-appearance:none; width:100%; height:10px; border-radius:999px;
    background:linear-gradient(to right, var(--h-low), var(--h-mid1), var(--h-mid2), var(--h-high));
    margin-bottom:22px;
  }
  [dir="rtl"] input[type=range].moodslider{
    background:linear-gradient(to left, var(--h-low), var(--h-mid1), var(--h-mid2), var(--h-high));
  }
  input[type=range].moodslider::-webkit-slider-thumb{
    -webkit-appearance:none; width:30px; height:30px; border-radius:50%;
    background:#fff; border:3px solid var(--ink); box-shadow:0 2px 8px rgba(0,0,0,.2);
  }
  input[type=range].moodslider::-moz-range-thumb{
    width:30px; height:30px; border-radius:50%; background:#fff; border:3px solid var(--ink);
  }
  .moodnote{width:100%; padding:12px 16px; border-radius:var(--radius-md); background:var(--paper-raised); border:1px solid var(--line); margin-bottom:14px;}

  /* ---------- Calendar ---------- */
  .cal-header{display:flex; align-items:center; justify-content:space-between; padding:8px 2px 12px;}
  .cal-title{font-weight:700; font-size:1rem;}
  .cal-nav{display:flex; align-items:center; gap:4px;}
  .cal-nav-btn svg{width:19px; height:19px;}
  [dir="rtl"] .cal-nav-btn svg{transform:scaleX(-1);}
  .cal-today-btn{font-size:0.74rem; color:var(--accent); padding:5px 11px; border-radius:999px; border:1px solid var(--line); margin-inline-end:2px; transition:background .15s ease;}
  .cal-today-btn:hover{background:var(--line);}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:24px;}
  .cal-wd{text-align:center; font-size:0.66rem; color:var(--ink-faint); padding-bottom:4px;}
  .cal-cell{
    aspect-ratio:1; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:0.78rem; background:var(--paper-raised); border:1px solid var(--line); color:var(--ink-soft);
    transition:background .3s ease, color .3s ease, transform .15s ease, box-shadow .15s ease;
  }
  .cal-cell.empty-slot{visibility:hidden;}
  .cal-cell.has-entry{border-color:transparent; font-weight:700;}
  .cal-cell.clickable{cursor:pointer;}
  .cal-cell.clickable:hover{transform:scale(1.08); box-shadow:0 3px 10px rgba(0,0,0,.14);}
  .cal-cell.clickable:active{transform:scale(.94);}
  .cal-cell.is-today{box-shadow:0 0 0 2px var(--ink) inset;}

  /* ---------- History ---------- */
  .day-card{
    margin-bottom:10px; border-radius:var(--radius-md); background:var(--paper-raised);
    border:1px solid var(--line); overflow:hidden;
  }
  .day-head{display:flex; align-items:center; gap:12px; padding:13px 15px; cursor:pointer; transition:background .15s ease;}
  .day-head:hover{background:#2B2E330A;}
  .day-swatch{width:10px; height:36px; border-radius:6px; flex:0 0 auto; transition:background .3s ease;}
  .day-meta{flex:1; min-width:0;}
  .day-date{font-weight:700; font-size:0.92rem;}
  .day-excerpt{color:var(--ink-soft); font-size:0.82rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .day-flows{display:flex; gap:4px; flex:0 0 auto;}
  .day-flows span{width:6px; height:6px; border-radius:50%; background:var(--ink-faint);}
  .day-body{max-height:0; overflow:hidden; padding:0 15px 14px; transition:max-height .35s ease;}
  .day-card.open .day-body{max-height:2000px;}
  .entry-row{padding:10px 0; border-top:1px solid var(--line);}
  .entry-row .entry-time{font-size:0.72rem; color:var(--ink-faint); margin-bottom:3px;}
  .entry-row .entry-flow{font-size:0.72rem; color:var(--accent); font-weight:700; margin-inline-start:8px;}
  .entry-row .entry-text{font-size:0.88rem; line-height:1.5;}
  .empty-state{padding:60px 20px; text-align:center; color:var(--ink-faint); font-size:0.9rem;}

  /* ---------- Insights ---------- */
  .stat-row{display:flex; gap:10px; margin:14px 0;}
  .period-row{margin:2px 0 4px;}
  .stat-card{
    flex:1; background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:14px; text-align:center;
  }
  .stat-card .num{font-size:1.6rem; font-weight:700; font-family:'Frank Ruhl Libre', serif;}
  .stat-card .lbl{font-size:0.72rem; color:var(--ink-soft); margin-top:2px;}
  .section-title{font-size:0.95rem; font-weight:700; margin:22px 0 10px;}
  .horizon-chart{display:flex; align-items:flex-end; gap:3px; height:90px; padding:10px 0;}
  .horizon-bar{flex:1; border-radius:4px 4px 2px 2px; min-height:6px; background:var(--line); position:relative; transition:height .5s ease, background .5s ease;}
  .reflect-card{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius-md); padding:16px;}
  .reflect-card p{margin:10px 0 0; font-size:0.9rem; line-height:1.55; transition:opacity .25s ease;}
  .reflect-btn{padding:10px 16px; border-radius:999px; background:var(--ink); color:var(--paper); font-size:0.85rem; font-weight:600; transition:opacity .15s ease, transform .12s ease;}
  .reflect-btn:active:not(:disabled){transform:scale(.96);}
  .reflect-btn:disabled{opacity:.4;}

  /* ---------- Settings sheet ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(43,46,51,.35); z-index:40;
    opacity:0; visibility:hidden; pointer-events:none; transition:opacity .25s ease, visibility .25s;
  }
  .sheet-backdrop.open{opacity:1; visibility:visible; pointer-events:auto;}
  .sheet{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    background:var(--paper); border-radius:22px 22px 0 0; padding:20px 22px calc(26px + var(--safe-b));
    transform:translateY(100%); transition:transform .25s ease; z-index:41;
  }
  .sheet.open{transform:translateY(0);}
  .sheet h2{font-size:1.1rem; margin:0 0 16px;}
  .sheet .field input{width:100%;}
  .data-actions{display:flex; gap:10px; margin-top:18px;}
  .data-btn{
    flex:1; padding:11px; border-radius:var(--radius-md); border:1px solid var(--line);
    background:var(--paper-raised); font-size:0.85rem; font-weight:600; color:var(--ink);
    transition:background .15s ease, border-color .15s ease, transform .12s ease;
  }
  .data-btn:hover{border-color:var(--accent);}
  .data-btn:active{transform:scale(.98);}
  .danger-btn{color:var(--danger); font-size:0.88rem; margin-top:18px; text-decoration:underline; text-decoration-color:#B5564A33; transition:opacity .15s ease;}
  .danger-btn:hover{opacity:.75;}
  .sheet-close{display:block; width:100%; text-align:center; padding:13px; margin-top:18px; border-radius:var(--radius-md); background:var(--line); font-weight:600; font-size:0.92rem; transition:background .15s ease, transform .12s ease;}
  .sheet-close:hover{background:var(--ink-faint); color:var(--paper);}
  .sheet-close:active{transform:scale(.98);}

  /* ---------- Sidebar (desktop) ---------- */
  .sidenav-brand{display:flex; align-items:center; gap:10px; padding:6px 10px 24px;}
  .sidenav-brand img{width:30px; height:30px; border-radius:8px;}
  .sidenav-brand span{font-size:1.2rem; font-weight:700;}
  .sidenav-spacer{flex:1;}
  .sidenav .nav-btn{
    display:flex; flex-direction:row; align-items:center; gap:12px; width:100%;
    padding:11px 12px; border-radius:12px; color:var(--ink-soft); font-size:0.92rem;
    margin-bottom:2px; transition:background .15s ease, color .15s ease;
  }
  .sidenav .nav-btn svg{width:20px; height:20px; flex:0 0 auto;}
  .sidenav .nav-btn:hover{background:var(--line);}
  .sidenav .nav-btn.active{background:var(--accent); color:var(--accent-ink);}
  .sidenav-lang{margin-bottom:10px;}
  .sidenav .settings-btn{
    display:flex; align-items:center; gap:12px; width:100%; padding:11px 12px;
    border-radius:12px; color:var(--ink-soft); font-size:0.92rem; transition:background .15s ease;
  }
  .sidenav .settings-btn svg{width:20px; height:20px; flex:0 0 auto;}
  .sidenav .settings-btn:hover{background:var(--line);}

  /* ---------- Desktop layout ---------- */
  @media (min-width:860px){
    body{
      background:var(--line); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
    }
    #onboarding{
      max-width:440px; min-height:auto; justify-content:flex-start;
      margin:0; padding:46px 42px; border-radius:24px; box-shadow:var(--shadow);
      background:var(--paper);
    }
    #app{
      max-width:1080px; height:calc(100vh - 64px); min-height:0; margin:0;
      border-radius:24px; overflow:hidden; box-shadow:var(--shadow); background:var(--paper);
    }
    #app.live{display:flex; flex-direction:row; align-items:stretch;}
    .sidenav{
      display:flex; flex-direction:column; width:230px; flex:0 0 230px;
      padding:26px 18px; border-inline-end:1px solid var(--line); background:var(--paper-raised);
    }
    .app-shell{min-height:0;}
    .app-shell header.topbar{display:none;}
    .app-shell .ribbon{margin:20px 32px 4px;}
    .app-shell main{padding:0; padding-bottom:28px;}
    .app-shell .panel{max-width:640px; margin:0 auto; padding:6px 32px 32px;}
    .app-shell .footer-ribbon{max-width:640px; margin:30px auto 10px;}
    .app-shell .footer-credit{max-width:640px; margin:0 auto; padding:0 0 22px;}
    nav.bottomnav{display:none;}

    .sheet{
      left:50%; right:auto; bottom:auto; top:50%; width:440px; max-width:90vw;
      border-radius:20px; transform:translate(-50%,-46%); opacity:0; pointer-events:none;
      transition:transform .25s ease, opacity .25s ease;
    }
    .sheet.open{transform:translate(-50%,-50%); opacity:1; pointer-events:auto;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }

</style>
</head>
<body>

<div id="onboarding">
  <div class="ob-mark"><img src="icon-192.png" alt=""></div>
  <h1 class="ob-title display" id="ob-title">נעים להכיר</h1>
  <p class="ob-sub" id="ob-sub">כמה דברים קטנים, ואז נתחיל.</p>

  <div class="field">

<script>
(function(){

  var WEEKDAYS = {
    he: ['יום ראשון','יום שני','יום שלישי','יום רביעי','יום חמישי','יום שישי','שבת'],

  };
  var MONTHS = {
    he: ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'],
    en: ['January','February','March','April','May','June','July','August','September','October','November','December']
  };

  var STRINGS = {
    he: {
      onboardTitle:'נעים להכיר', onboardSub:'כמה דברים קטנים, ואז נתחיל.',
      nameLabel:'איך נקרא לך?', namePh:'השם שלך',
      genderLabel:'כדי לדבר אליך נכון:', genderM:'זכר', genderF:'נקבה', genderX:'מעדיף/ה לא לציין',
      langLabel:'שפה', continueBtn:'בואו נתחיל',
      navChat:'שיחה', navHistory:'היסטוריה', navInsights:'תובנות',
      greetMorning:'בוקר טוב', greetAfternoon:'צהריים טובים', greetEvening:'ערב טוב', greetNight:'לילה טוב',
      flowMorning:'יומן בוקר', flowEvening:'סיכום יום', flowMood:'מצב רוח', flowGratitude:'יומן תודות', flowChat:'שיחה חופשית',
      composerPh:'מה שעל הלב…',
      distressText:'אם קשה עכשיו, אפשר להתקשר לער"ן בחינם —',
      endFlow:'לסיים ולשמור',
      moodSub:'גררו לבחירת מצב הרוח',
      moodNotePh:'רוצים להוסיף שורה? (לא חובה)', moodSave:'לשמור',
      historyEmpty:'אין עדיין רשומות. הן יופיעו כאן.', calToday:'היום',
      credit:'נוצר על ידי גפן ר. גולני, 2026',
      streakLabel:'רצף ימים', entriesLabel:'רשומות', avgLabel:'מצב רוח ממוצע',
      periodWeek:'שבוע', periodMonth:'חודש', periodYear:'שנה',
      jumpWeek:'השבוע', jumpMonth:'החודש', jumpYear:'השנה',
      weekTitle:'תובנה על השבוע', reflectBtn:'ליצור תובנה',
      reflectLoading:'חושב על השבוע…', reflectEmpty:'אחרי כמה רשומות יהיה כאן מה לומר.',
      settingsTitle:'הגדרות', settingsName:'שם', settingsLang:'שפה',
      exportData:'ייצוא נתונים', importData:'ייבוא נתונים',
      importConfirm:'ייבוא יחליף את כל המידע הקיים באפליקציה. להמשיך?',
      importError:'הקובץ לא תקין, או לא בפורמט המתאים.', importSuccess:'הנתונים יובאו בהצלחה.',
      clearData:'מחיקת כל המידע', clearConfirm:'למחוק את כל הרשומות? אי אפשר לשחזר.',
      close:'סגירה', aiError:'(לא הצלחתי להתחבר כרגע — הרשומה נשמרה בכל זאת)'
    },
    en: {
      onboardTitle:"Let's set things up", onboardSub:'A couple of quick things first.',
      nameLabel:'What should we call you?', namePh:'Your name',
      genderLabel:'So I can speak to you naturally:', genderM:'He/him', genderF:'She/her', genderX:'Prefer not to say',
      langLabel:'Language', continueBtn:"Let's begin",
      navChat:'Chat', navHistory:'History', navInsights:'Insights',
      greetMorning:'Good morning', greetAfternoon:'Good afternoon', greetEvening:'Good evening', greetNight:'Good night',
      flowMorning:'Morning check-in', flowEvening:'Evening summary', flowMood:'Mood', flowGratitude:'Gratitude', flowChat:'Just talk',
      composerPh:"What's on your mind…",
      distressText:"If things feel heavy right now, ER'N is free to call —",
      endFlow:'Finish & save',
      moodSub:'Drag to set your mood',
      moodNotePh:'Want to add a line? (optional)', moodSave:'Save',
      historyEmpty:'No entries yet. They\u2019ll show up here.', calToday:'Today',
      credit:'Made by Gefen R. Golani, 2026',
      streakLabel:'Day streak', entriesLabel:'Entries', avgLabel:'Average mood',
      periodWeek:'Week', periodMonth:'Month', periodYear:'Year',
      jumpWeek:'This week', jumpMonth:'This month', jumpYear:'This year',
      weekTitle:'This week', reflectBtn:'Reflect on this week',
      reflectLoading:'Thinking about your week…', reflectEmpty:"After a few entries, there'll be something to say here.",
      settingsTitle:'Settings', settingsName:'Name', settingsLang:'Language',
      exportData:'Export data', importData:'Import data',
      importConfirm:'Importing will replace all existing data in the app. Continue?',
      importError:"This file isn't valid, or isn't the right format.", importSuccess:'Data imported successfully.',
      clearData:'Erase all data', clearConfirm:"Delete all entries? This can't be undone.",
      close:'Close', aiError:"(couldn't reach your companion just now — your entry's saved either way)"
    }
  };

  var FLOWS = ['morning','evening','mood','gratitude','chat'];
  var FLOW_KEY = { morning:'flowMorning', evening:'flowEvening', mood:'flowMood', gratitude:'flowGratitude', chat:'flowChat' };

  function tr(key, langOverride){
    var lang = langOverride || (state.profile && state.profile.lang) || 'he';
    return (STRINGS[lang] && STRINGS[lang][key] !== undefined) ? STRINGS[lang][key] : key;
  }

  /* ============ State ============ */
  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { profile:null, entries:[], weeklyCache:{} };
  }
  var state = loadState();
  function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }

  /* ============ Mood color (the horizon mapping) ============ */
  var MOOD_STOPS = [[0,[0x2E,0x31,0x48]],[0.45,[0x5B,0x6B,0x8C]],[0.70,[0x8F,0xB8,0xC9]],[1,[0xF4,0xC7,0x7B]]];
  function moodColor(value){
    var f = value/(MOOD_STEPS-1);
    for(var i=0;i<MOOD_STOPS.length-1;i++){
      var t0=MOOD_STOPS[i][0], c0=MOOD_STOPS[i][1], t1=MOOD_STOPS[i+1][0], c1=MOOD_STOPS[i+1][1];
      if(f>=t0 && f<=t1){
        var lt = t1>t0 ? (f-t0)/(t1-t0) : 0;
        var c = c0.map(function(v,idx){ return Math.round(v+(c1[idx]-v)*lt); });
        return 'rgb('+c[0]+','+c[1]+','+c[2]+')';
      }
    }
    var last = MOOD_STOPS[MOOD_STOPS.length-1][1];
    return 'rgb('+last[0]+','+last[1]+','+last[2]+')';
  }

  /* ============ Date helpers (hardcoded names — avoids toLocaleDateString quirks) ============ */
  function pad(n){ return String(n).padStart(2,'0'); }
  function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function timeStr(d){ d=d||new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
  function dayPart(h){
    if(h>=5 && h<12) return 'morning';
    if(h>=12 && h<17) return 'afternoon';
    if(h>=17 && h<21) return 'evening';
    return 'night';
  }
  function formatDate(dateStr){
    var lang = (state.profile && state.profile.lang) || 'he';
    var parts = dateStr.split('-').map(Number);
    var dt = new Date(parts[0], parts[1]-1, parts[2]);
    var wd = WEEKDAYS[lang][dt.getDay()];
    var mo = MONTHS[lang][parts[1]-1];
    return lang==='he' ? (wd+', '+parts[2]+' ב'+mo) : (wd+', '+mo+' '+parts[2]);
  }
  function lastNDays(n){
    var out=[], d=new Date();
    for(var i=0;i<n;i++){ out.push(todayStr(d)); d.setDate(d.getDate()-1); }
    return out;
  }

  /* ============ Onboarding ============ */
  var obLang = 'he';
  var obGender = null;

  function renderOnboarding(){
    document.documentElement.lang = obLang;
    document.documentElement.dir = obLang==='he' ? 'rtl' : 'ltr';
    document.getElementById('ob-title').textContent = tr('onboardTitle', obLang);
    document.getElementById('ob-sub').textContent = tr('onboardSub', obLang);
    document.getElementById('ob-name-label').textContent = tr('nameLabel', obLang);
    document.getElementById('ob-name').placeholder = tr('namePh', obLang);
    document.getElementById('ob-gender-label').textContent = tr('genderLabel', obLang);
    document.getElementById('ob-lang-label').textContent = tr('langLabel', obLang);
    document.getElementById('ob-continue').textContent = tr('continueBtn', obLang);

    var genderRow = document.getElementById('ob-gender-row');
    genderRow.innerHTML = '';
    [['m', tr('genderM',obLang)], ['f', tr('genderF',obLang)], ['x', tr('genderX',obLang)]].forEach(function(pair){
      var b = document.createElement('button');
      b.type='button'; b.className='pill'+(obGender===pair[0]?' active':'');
      b.textContent = pair[1];
      b.addEventListener('click', function(){ obGender = pair[0]; renderOnboarding(); validateOnboard(); });
      genderRow.appendChild(b);
    });

    var langRow = document.getElementById('ob-lang-row');
    langRow.innerHTML = '';
    [['he','עברית'],['en','English']].forEach(function(pair){
      var b = document.createElement('button');
      b.type='button'; b.className='pill'+(obLang===pair[0]?' active':'');
      b.textContent = pair[1];
      b.addEventListener('click', function(){ obLang = pair[0]; renderOnboarding(); });
      langRow.appendChild(b);
    });
  }

  function validateOnboard(){
    var name = document.getElementById('ob-name').value.trim();
    document.getElementById('ob-continue').disabled = !(name && obGender);
  }
  document.getElementById('ob-name').addEventListener('input', validateOnboard);

  document.getElementById('ob-continue').addEventListener('click', function(){
    var name = document.getElementById('ob-name').value.trim();
    if(!name || !obGender) return;
    state.profile = { name: name, gender: obGender, lang: obLang, onboarded: true };
    saveState();
    document.getElementById('onboarding').style.display = 'none';
    startApp();
  });

  /* ============ App init ============ */
  function startApp(){
    applyLangDir();
    document.getElementById('app').classList.add('live');
    renderStaticLabels();
    renderGreeting();
    renderFlowChips();
    updateRibbon();
    renderHistory();
    renderInsights();
    registerSW();
    document.getElementById('settings-name').value = state.profile.name;
    renderSettingsLangRow();
    highlightLangToggle();
  }

  function applyLangDir(){
    var lang = state.profile.lang;
    document.documentElement.lang = lang;
    document.documentElement.dir = lang==='he' ? 'rtl' : 'ltr';
  }

  function renderStaticLabels(){
    var brandText = state.profile.lang==='he' ? 'אופק' : 'Ofek';
    document.querySelectorAll('.brand-text').forEach(function(el){ el.textContent = brandText; });
    document.querySelectorAll('[data-nav="chat"]').forEach(function(el){ el.textContent = tr('navChat'); });
    document.querySelectorAll('[data-nav="history"]').forEach(function(el){ el.textContent = tr('navHistory'); });
    document.querySelectorAll('[data-nav="insights"]').forEach(function(el){ el.textContent = tr('navInsights'); });
    document.getElementById('distress-text').innerHTML = tr('distressText')+' <a href="tel:1201">1201</a>';
    document.getElementById('composer-input').placeholder = tr('composerPh');

  function buildSystemPrompt(flow){
    var lang = state.profile.lang;
    var name = state.profile.name;
    var genderNote = '';
    if(lang==='he'){
      genderNote = state.profile.gender==='m' ? ' פנה/י אליו בלשון זכר.' :
                   state.profile.gender==='f' ? ' פנה/י אליה בלשון נקבה.' :
                   ' פנה/י בלשון נטרלית.';
    }
    var base = lang==='he'
      ? ('את/ה אופק — מלווה יומי שקט, חם ולא שיפוטי. השם של מי שמדבר/ת אליך הוא '+name+'.'+genderNote+' תשובות קצרות (1–3 משפטים), שאלה אחת בכל פעם, בלי קלישאות ובלי להטיף.')
      : ('You are Ofek, a quiet, warm, non-judgmental daily companion. The person you are talking to is named '+name+'. Keep replies short (1-3 sentences), ask one question at a time, no clichés, no lecturing.');
    var notes = {
      morning: lang==='he' ? ' זה צ\u2019ק-אין בוקר — שאל/י על השינה והאנרגיה ליום.' : ' This is a morning check-in — ask about sleep and energy for the day.',
      evening: lang==='he' ? ' זה סיכום יום — שאל/י מה בלט היום, טוב או קשה.' : ' This is an evening summary — ask what stood out today, good or hard.',
      gratitude: lang==='he' ? ' זה יומן תודות — בקש/י דבר אחד או שניים שיש תודה עליהם היום.' : ' This is a gratitude check-in — ask for one or two things they are thankful for today.',
      chat: lang==='he' ? ' זו שיחה חופשית — תן/י למשתמש/ת לכוון.' : ' This is open chat — let the person lead.',
      mood: lang==='he' ? ' זה רישום מצב רוח קצר.' : ' This is a brief mood log.'
    };
    return base + (notes[flow] || '');
  }

  async function askCompanion(system, messages){
    var res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: system, messages: messages, max_tokens: 300 })
    });
    if(!res.ok) throw new Error('bad status');
    var data = await res.json();
    var text = data && data.content && data.content[0] && data.content[0].text;
    if(!text) throw new Error('empty response');
    return text;
  }

  async function kickoffFlow(flow){
    var lang = state.profile.lang;
    var system = buildSystemPrompt(flow);
    var kickoffMsg = lang==='he' ? 'פתח/י את השיחה בשאלה אחת קצרה, בלי הקדמות.' : 'Open the conversation with one short question, no preamble.';
    setSending(true);
    try{
      var reply = await askCompanion(system, [{role:'user', content: kickoffMsg}]);
      conversation.push({role:'ai', text: reply});
      addBubble('ai', reply);
    }catch(e){
      addBubble('ai', tr('aiError'));
    }
    setSending(false);
  }

  function persistEntry(moodVal, note){
    var now = new Date();
    var entry = state.entries.find(function(e){ return e.id===activeEntryId; });
    if(!entry){
      entry = { id: activeEntryId, date: todayStr(now), time: timeStr(now), flow: currentFlow, mood: null, messages: [], createdAt: Date.now() };
      state.entries.push(entry);
    }
    entry.messages = conversation.slice();
    if(typeof moodVal === 'number') entry.mood = moodVal;
    if(note) entry.note = note;
    saveState();
    updateRibbon();
  }

      var msgs = conversation.map(function(c){ return { role: c.role==='ai' ? 'assistant' : 'user', content: c.text }; });
      var reply = await askCompanion(system, msgs);
      conversation.push({role:'ai', text: reply});
      addBubble('ai', reply);
      persistEntry();
    }catch(e){
      addBubble('ai', tr('aiError'));
    }
    setSending(false);
  }

  function idealTextOn(rgbStr){
    var nums = rgbStr.match(/\d+/g).map(Number);
    var lum = 0.299*nums[0] + 0.587*nums[1] + 0.114*nums[2];

  function renderCalendar(){
    var host = document.getElementById('calendar-host');
    if(!host) return;
    host.innerHTML = '';
    var lang = state.profile.lang;
    var year = calendarMonth.getFullYear(), month = calendarMonth.getMonth();

    var header = document.createElement('div'); header.className = 'cal-header';
    var title = document.createElement('div'); title.className = 'cal-title';
    title.textContent = MONTHS[lang][month] + ' ' + year;

    var navWrap = document.createElement('div'); navWrap.className = 'cal-nav';
    var now = new Date();
    if(year !== now.getFullYear() || month !== now.getMonth()){
      var todayBtn = document.createElement('button'); todayBtn.className = 'cal-today-btn';
      todayBtn.textContent = tr('calToday');
      todayBtn.addEventListener('click', function(){
        calendarMonth = new Date(); calendarMonth.setDate(1); calendarMonth.setHours(0,0,0,0);
        renderCalendar();
      });
      navWrap.appendChild(todayBtn);
    }

    var prevBtn = document.createElement('button'); prevBtn.className = 'icon-btn cal-nav-btn';
    prevBtn.innerHTML = SVG_CHEVRON_LEFT;
    prevBtn.addEventListener('click', function(){ calendarMonth.setMonth(calendarMonth.getMonth()-1); renderCalendar(); });

    var nextBtn = document.createElement('button'); nextBtn.className = 'icon-btn cal-nav-btn';
    nextBtn.innerHTML = SVG_CHEVRON_RIGHT;
    nextBtn.addEventListener('click', function(){ calendarMonth.setMonth(calendarMonth.getMonth()+1); renderCalendar(); });

    navWrap.appendChild(prevBtn); navWrap.appendChild(nextBtn);
    header.appendChild(title); header.appendChild(navWrap);
    host.appendChild(header);

    var grid = document.createElement('div'); grid.className = 'cal-grid';
    WD_SHORT[lang].forEach(function(w){
      var el = document.createElement('div'); el.className = 'cal-wd'; el.textContent = w;
      grid.appendChild(el);
    });

    var firstDow = new Date(year, month, 1).getDay();
    for(var i=0;i<firstDow;i++){
      var padCell = document.createElement('div'); padCell.className = 'cal-cell empty-slot';
      grid.appendChild(padCell);
    }

    var daysInMonth = new Date(year, month+1, 0).getDate();
    var todayKey = todayStr();
    for(var d=1; d<=daysInMonth; d++){
      var dateKey = year+'-'+pad(month+1)+'-'+pad(d);
      var dayEntries = state.entries.filter(function(e){ return e.date===dateKey; });
      var cell = document.createElement('div'); cell.className = 'cal-cell';
      cell.textContent = d;
      if(dateKey===todayKey) cell.classList.add('is-today');

      if(dayEntries.length){
        var moods = dayEntries.filter(function(e){ return typeof e.mood==='number'; }).map(function(e){ return e.mood; });
        var bg, fg;
        if(moods.length){
          var avg = moods.reduce(function(a,b){ return a+b; },0)/moods.length;
          bg = moodColor(avg);
          fg = idealTextOn(bg);
        } else {
          bg = 'var(--accent)'; fg = '#fff';
        }
        cell.classList.add('has-entry','clickable');
        cell.style.background = bg;
        cell.style.color = fg;
        cell.addEventListener('click', (function(key){ return function(){ jumpToDay(key); }; })(dateKey));
      }
      grid.appendChild(cell);
    }
    host.appendChild(grid);
  }

  /* ============ Insights ============ */
  function computeStreak(){
    var streak = 0;
    var dates = {};
    state.entries.forEach(function(e){ dates[e.date] = true; });
    var cursor = new Date();
    if(!dates[todayStr(cursor)]) cursor.setDate(cursor.getDate()-1);
    while(dates[todayStr(cursor)]){ streak++; cursor.setDate(cursor.getDate()-1); }
    return streak;
  }

  function statCard(num, lbl){
    var d = document.createElement('div'); d.className = 'stat-card';
    var numEl = document.createElement('div'); numEl.className = 'num'; numEl.textContent = num;
    var lblEl = document.createElement('div'); lblEl.className = 'lbl'; lblEl.textContent = lbl;
    d.appendChild(numEl); d.appendChild(lblEl);
    return d;
  }

  function startOfWeek(d){
    var x = new Date(d); x.setHours(0,0,0,0);
    x.setDate(x.getDate() - x.getDay());
    return x;
  }
  function addDays(d, n){ var x = new Date(d); x.setDate(x.getDate()+n); return x; }

  function periodRange(period, anchor){
    if(period === 'week'){
      var start = startOfWeek(anchor);
      return { start: start, end: addDays(start, 6) };
    }
    if(period === 'year'){
      return { start: new Date(anchor.getFullYear(), 0, 1), end: new Date(anchor.getFullYear(), 11, 31) };
    }
    return { start: new Date(anchor.getFullYear(), anchor.getMonth(), 1), end: new Date(anchor.getFullYear(), anchor.getMonth()+1, 0) };
  }

  function shiftAnchor(period, dir){
    var a = new Date(insightsAnchor);
    if(period==='week') a.setDate(a.getDate() + 7*dir);
    else if(period==='year') a.setFullYear(a.getFullYear() + dir);
    else a.setMonth(a.getMonth() + dir);
    insightsAnchor = a;
  }

  function isCurrentPeriod(period, anchor){
    var now = new Date();
    if(period==='week') return todayStr(startOfWeek(now)) === todayStr(startOfWeek(anchor));
    if(period==='year') return now.getFullYear() === anchor.getFullYear();
    return now.getFullYear()===anchor.getFullYear() && now.getMonth()===anchor.getMonth();
  }

  function formatPeriodLabel(period, range){
    var lang = state.profile.lang;
    var LRI = '\u2066', PDI = '\u2069'; // isolate marks: keep "14–20" from visually reordering inside RTL text
    if(period === 'year') return String(range.start.getFullYear());
    if(period === 'month') return MONTHS[lang][range.start.getMonth()] + ' ' + range.start.getFullYear();
    var s = range.start, e = range.end;
    var sMonth = MONTHS[lang][s.getMonth()], eMonth = MONTHS[lang][e.getMonth()];
    var sameMonth = s.getMonth()===e.getMonth();
    if(sameMonth){
      var rangeStr = LRI + s.getDate()+'–'+e.getDate() + PDI;
      return lang==='he' ? (rangeStr+' ב'+sMonth) : (sMonth+' '+rangeStr);
    }
    if(lang==='he'){
      return s.getDate()+' ב'+sMonth+' – '+e.getDate()+' ב'+eMonth;
    }
    return sMonth+' '+s.getDate()+' – '+eMonth+' '+e.getDate();
  }

  function renderHorizonChart(period, range){
    var wrap = document.createElement('div'); wrap.className = 'horizon-chart';

    function addBar(moods){
      var bar = document.createElement('div'); bar.className = 'horizon-bar';
      var finalHeight, finalColor;
      if(moods.length){
        var avg = moods.reduce(function(a,b){ return a+b; },0)/moods.length;
        finalHeight = (14 + avg*5)+'px';
        finalColor = moodColor(avg);
      } else {
        finalHeight = '6px';
        finalColor = null;
      }
      bar.style.height = '4px';
      if(finalColor) bar.style.background = finalColor;
      wrap.appendChild(bar);
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ bar.style.height = finalHeight; });
      });
    }

    if(period === 'year'){
      var yr = range.start.getFullYear();
      for(var m=0; m<12; m++){
        var monthIdx = m;
        var moods = state.entries.filter(function(e){
          return typeof e.mood==='number' && Number(e.date.slice(0,4))===yr && Number(e.date.slice(5,7))-1===monthIdx;
        }).map(function(e){ return e.mood; });
        addBar(moods);
      }
    } else {
      var cur = new Date(range.start);
      while(cur <= range.end){
        var dateKey = todayStr(cur);
        var moods = state.entries.filter(function(e){ return e.date===dateKey && typeof e.mood==='number'; }).map(function(e){ return e.mood; });
        addBar(moods);
        cur.setDate(cur.getDate()+1);
      }
    }
    return wrap;
  }

  function getISOWeekKey(){
    var d = new Date();
    var onejan = new Date(d.getFullYear(),0,1);
    var week = Math.ceil((((d-onejan)/86400000) + onejan.getDay()+1)/7);
    return d.getFullYear()+'-W'+week;
  }

  async function generateWeeklyReflection(){
    var lang = state.profile.lang;
    var week = lastNDays(7);
    var entries = state.entries.filter(function(e){ return week.indexOf(e.date) !== -1; });
    var summary = entries.map(function(e){
      var moodPart = typeof e.mood==='number' ? MOOD_LABELS[lang][e.mood]+': ' : '';
      var textPart = (e.messages||[]).filter(function(m){ return m.role==='user'; }).map(function(m){ return m.text; }).join(' ') || e.note || '';
      return moodPart+textPart;
    }).filter(Boolean).join('\n');

    var system = lang==='he'
      ? ('את/ה אופק. הנה רשומות של '+state.profile.name+' מהשבוע האחרון. כתוב/כתבי פסקה קצרה (2–4 משפטים), חמה ולא שיפוטית, שמשקפת דפוס או תובנה אחת — לא רשימה, לא סיכום מכני.')
      : ("You are Ofek. Here are "+state.profile.name+"'s entries from the past week. Write one short, warm, non-judgmental paragraph (2-4 sentences) reflecting a single pattern or insight — not a list, not a mechanical summary.");

    var userMsg = summary || (lang==='he' ? 'אין הרבה לעבוד איתו השבוע.' : 'Not much to go on this week.');
    return await askCompanion(system, [{role:'user', content: userMsg}]);
  }

  function renderReflectCard(){
    var card = document.createElement('div'); card.className = 'reflect-card';
    var isoWeek = getISOWeekKey();
    var cached = state.weeklyCache[isoWeek];
    var btn = document.createElement('button'); btn.className = 'reflect-btn'; btn.textContent = tr('reflectBtn');
    var p = document.createElement('p');

    var daysWithEntries = lastNDays(7).filter(function(d){ return state.entries.some(function(e){ return e.date===d; }); });
    if(cached){
      p.textContent = cached;
    } else if(daysWithEntries.length < 2){
      p.textContent = tr('reflectEmpty');
      btn.disabled = true;
    }

    btn.addEventListener('click', async function(){
      btn.disabled = true; p.style.opacity = '1'; p.textContent = tr('reflectLoading');
      try{
        var text = await generateWeeklyReflection();
        state.weeklyCache[isoWeek] = text;
        saveState();
        p.style.opacity = '0';
        setTimeout(function(){ p.textContent = text; p.style.opacity = '1'; }, 180);
      }catch(e){
        p.style.opacity = '0';
        setTimeout(function(){ p.textContent = tr('aiError'); p.style.opacity = '1'; }, 180);
      }
      btn.disabled = false;
    });

    card.appendChild(btn); card.appendChild(p);
    return card;
  }

  var insightsPeriod = 'week';
  var insightsAnchor = new Date();
  var PERIOD_TYPE_KEY = { week:'periodWeek', month:'periodMonth', year:'periodYear' };
  var PERIOD_JUMP_KEY = { week:'jumpWeek', month:'jumpMonth', year:'jumpYear' };

  function renderInsights(){
    var host = document.getElementById('insights-content');
    host.innerHTML = '';

    var periodRow = document.createElement('div'); periodRow.className = 'pillrow period-row';
    ['week','month','year'].forEach(function(p){
      var b = document.createElement('button');
      b.className = 'pill'+(insightsPeriod===p?' active':'');
      b.textContent = tr(PERIOD_TYPE_KEY[p]);
      b.addEventListener('click', function(){ insightsPeriod = p; renderInsights(); });
      periodRow.appendChild(b);
    });
    host.appendChild(periodRow);

    var range = periodRange(insightsPeriod, insightsAnchor);

    var navHeader = document.createElement('div'); navHeader.className = 'cal-header';
    var navTitle = document.createElement('div'); navTitle.className = 'cal-title';
    navTitle.textContent = formatPeriodLabel(insightsPeriod, range);

    var navWrap = document.createElement('div'); navWrap.className = 'cal-nav';
    if(!isCurrentPeriod(insightsPeriod, insightsAnchor)){
      var jumpBtn = document.createElement('button'); jumpBtn.className = 'cal-today-btn';
      jumpBtn.textContent = tr(PERIOD_JUMP_KEY[insightsPeriod]);
      jumpBtn.addEventListener('click', function(){ insightsAnchor = new Date(); renderInsights(); });
      navWrap.appendChild(jumpBtn);
    }
    var prevBtn = document.createElement('button'); prevBtn.className = 'icon-btn cal-nav-btn';
    prevBtn.innerHTML = SVG_CHEVRON_LEFT;
    prevBtn.addEventListener('click', function(){ shiftAnchor(insightsPeriod, -1); renderInsights(); });
    var nextBtn = document.createElement('button'); nextBtn.className = 'icon-btn cal-nav-btn';
    nextBtn.innerHTML = SVG_CHEVRON_RIGHT;
    nextBtn.addEventListener('click', function(){ shiftAnchor(insightsPeriod, 1); renderInsights(); });
    navWrap.appendChild(prevBtn); navWrap.appendChild(nextBtn);

    navHeader.appendChild(navTitle); navHeader.appendChild(navWrap);
    host.appendChild(navHeader);

    var rangeDates = [];
    var cur = new Date(range.start);
    while(cur <= range.end){ rangeDates.push(todayStr(cur)); cur.setDate(cur.getDate()+1); }
    var periodEntries = state.entries.filter(function(e){ return rangeDates.indexOf(e.date) !== -1; });
    var periodMoods = periodEntries.filter(function(e){ return typeof e.mood==='number'; }).map(function(e){ return e.mood; });
    var avg = periodMoods.length ? (periodMoods.reduce(function(a,b){ return a+b; },0)/periodMoods.length) : null;

    var streak = computeStreak();
    var statRow = document.createElement('div'); statRow.className = 'stat-row';
    statRow.appendChild(statCard(streak, tr('streakLabel')));
    statRow.appendChild(statCard(periodEntries.length, tr('entriesLabel')));
    statRow.appendChild(statCard(avg!==null ? avg.toFixed(1) : '—', tr('avgLabel')));
    host.appendChild(statRow);

    host.appendChild(renderHorizonChart(insightsPeriod, range));

    var reflectTitle = document.createElement('div'); reflectTitle.className = 'section-title'; reflectTitle.textContent = tr('weekTitle');
    host.appendChild(reflectTitle);
    host.appendChild(renderReflectCard());
  }

  /* ============ Ribbon ============ */
  function updateRibbon(){
    var today = todayStr();
    var moods = state.entries.filter(function(e){ return e.date===today && typeof e.mood==='number'; }).map(function(e){ return e.mood; });
    var ribbon = document.getElementById('ribbon');
    if(moods.length){
      var avg = moods.reduce(function(a,b){ return a+b; },0)/moods.length;
      ribbon.style.background = moodColor(avg);
      ribbon.classList.remove('ambient');
    } else {
      ribbon.style.background = '';
      ribbon.classList.add('ambient');
    }
  }

  /* ============ Language toggle + settings ============ */
  function highlightLangToggle(){
    document.querySelectorAll('.lang-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.lang===state.profile.lang);
    });
  }
  document.querySelectorAll('.lang-btn').forEach(function(b){
    b.addEventListener('click', function(){ switchLang(b.dataset.lang); });
  });

  function switchLang(lang){
    state.profile.lang = lang;
    saveState();
    applyLangDir();
    renderStaticLabels();
    renderGreeting();
    renderFlowChips();
    renderHistory();
    renderInsights();
    highlightLangToggle();
    renderSettingsLangRow();
  }

  function renderSettingsLangRow(){
    var row = document.getElementById('settings-lang-row');
    row.innerHTML = '';
    [['he','עברית'],['en','English']].forEach(function(pair){
      var b = document.createElement('button');
      b.className = 'pill'+(state.profile.lang===pair[0]?' active':'');
      b.textContent = pair[1];
      b.addEventListener('click', function(){ switchLang(pair[0]); });
      row.appendChild(b);
    });
  }

  document.querySelectorAll('.settings-btn').forEach(function(b){
    b.addEventListener('click', openSettings);
  });
  document.getElementById('sheet-close-btn').addEventListener('click', closeSettings);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSettings);
  function openSettings(){
    document.getElementById('settings-sheet').classList.add('open');
    document.getElementById('sheet-backdrop').classList.add('open');
  }
  function closeSettings(){
    document.getElementById('settings-sheet').classList.remove('open');
    document.getElementById('sheet-backdrop').classList.remove('open');
    var newName = document.getElementById('settings-name').value.trim();
    if(newName) state.profile.name = newName;
    saveState();
    renderGreeting();
  }

  document.getElementById('clear-data-btn').addEventListener('click', function(){
    if(confirm(tr('clearConfirm'))){
      state.entries = [];
      state.weeklyCache = {};
      saveState();
      renderHistory();
      renderInsights();
      updateRibbon();
    }
  });

  /* ============ Export / Import ============ */
  document.getElementById('export-data-btn').addEventListener('click', function(){
    var payload = { app:'ofek', version:1, exportedAt:new Date().toISOString(), data:state };
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'ofek-backup-'+todayStr()+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  });

  document.getElementById('import-data-btn').addEventListener('click', function(){
    document.getElementById('import-file-input').click();
  });

  document.getElementById('import-file-input').addEventListener('change', function(e){
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      var parsed;
      try{
        parsed = JSON.parse(reader.result);
      }catch(err){
        alert(tr('importError'));
        e.target.value = '';
        return;
      }
      var incoming = (parsed && parsed.data) ? parsed.data : parsed;
      if(!incoming || !incoming.profile || !Array.isArray(incoming.entries)){
        alert(tr('importError'));
        e.target.value = '';
        return;
      }
      if(confirm(tr('importConfirm'))){
        state.profile = incoming.profile;
        state.entries = incoming.entries;
        state.weeklyCache = incoming.weeklyCache || {};
        saveState();
        applyLangDir();
        renderStaticLabels();
        renderGreeting();
        renderFlowChips();
        renderHistory();
        renderInsights();
        highlightLangToggle();
        renderSettingsLangRow();
        updateRibbon();
        document.getElementById('settings-name').value = state.profile.name || '';
        alert(tr('importSuccess'));
      }
      e.target.value = '';
    };
    reader.onerror = function(){
      alert(tr('importError'));
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  /* ============ Service worker ============ */
  function registerSW(){
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(function(){});
      var refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if(refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    }
  }

  /* ============ Init ============ */
  if(state.profile && state.profile.onboarded){
    document.getElementById('onboarding').style.display = 'none';
    startApp();
  } else {
    renderOnboarding();
  }

})();
</script>
</body>
</html>
